<!DOCTYPE html>

<html>

<head>
    <title>Sign Language Detection</title>


    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="bg-light">

    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-lg-8 col-md-10 col-12">

                <div class="card shadow">

                    <div class="card-header text-center">
                        <h2>Sign Language Detection</h2>
                    </div>

                    <div class="card-body text-center">

                        <img id="video-feed" src="" class="img-fluid rounded border">

                        <div class="mt-3"> <button id="start-btn" class="btn btn-success btn-lg"> Turn On Camera & Start
                                Predicting </button> <button id="stop-btn" class="btn btn-danger btn-lg ms-2"
                                style="display:none;"> Turn Off Camera </button> </div>

                        <div class="mt-4">

                            <h4>Prediction</h4>

                            <h2 id="prediction" class="text-primary">
                                Waiting...
                            </h2>

                        </div>

                    </div>

                </div>

            </div>

        </div>


    </div>

    <script>

        const videoFeed = document.getElementById("video-feed"); 
        const startBtn = document.getElementById("start-btn"); 
        const stopBtn = document.getElementById("stop-btn"); 

        startBtn.addEventListener("click", function () { 
            document.getElementById("prediction").innerText = "Starting Camera...";
            
            videoFeed.src = "/video_feed"; 
            startBtn.style.display = "none"; 
            stopBtn.style.display = "inline-block"; }); 

        stopBtn.addEventListener("click",async function () { 
            await fetch("/stop_camera");

            videoFeed.src = ""; 
            
            startBtn.style.display = "inline-block"; 
            stopBtn.style.display = "none"; 
            
            document.getElementById("prediction").innerText = "Camera Off"; });

        setInterval(async () => { 

            if (!videoFeed.getAttribute("src")) {
                return;
            }

            try { 
                const response = await fetch("/prediction"); 
                const data = await response.json(); 
                const predictionElement = document.getElementById("prediction"); 
                predictionElement.innerText = data.prediction; 
                if (data.confidence >= 0.90) { 
                    predictionElement.style.color = "green"; 
                } 
                    else if (data.confidence >= 0.80) { 
                        predictionElement.style.color = "orange"; 
                    } 
                        else { 
                            predictionElement.style.color = "red"; 
                        } 
                    } 
                    catch (error) { 
                        console.log(error); 
                    } 
                }, 500);

    </script>

</body>

</html>
